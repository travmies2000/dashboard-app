<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        #app { display: none; }
        .tab-btn { padding: 10px; cursor: pointer; background: #ddd; border: none; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Access</button>
    </div>

    <!-- Dashboard Content -->
    <div id="app">
        <nav>
            <button class="tab-btn" onclick="openTab('prompt')">Prompt Generator</button>
            <button class="tab-btn" onclick="openTab('trouble')">Troubleshooter</button>
        </nav>

        <div id="prompt" class="tab-content active">
            <h3>Prompt Generator</h3>
            <textarea id="promptInput" rows="3" style="width:100%"></textarea>
            <button onclick="genPrompt()">Generate</button>
            <p id="promptOutput"></p>
        </div>

        <div id="trouble" class="tab-content">
            <h3>Troubleshooting Matrix</h3>
            <select id="issue">
                <option value="Low traffic">Low traffic</option>
                <option value="Zero conversions">Zero conversions</option>
            </select>
            <button onclick="diag()">Diagnose</button>
            <p id="diagOutput"></p>
        </div>
    </div>
</div>

<script>
    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function genPrompt() { document.getElementById('promptOutput').innerText = "Expert Prompt: " + document.getElementById('promptInput').value; }
    
    function diag() { 
        const issue = document.getElementById('issue').value;
        const solution = issue === 'Low traffic' ? "Focus on SEO and social distribution." : "Review your offer clarity and lead magnet alignment.";
        document.getElementById('diagOutput').innerText = "Solution: " + solution;
    }
</script>
</body>
</html>
