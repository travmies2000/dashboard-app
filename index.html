<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Selling Global | Master Dashboard</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.8); --navy: #0f172a; --indigo: #4f46e5; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid white; }
        
        .metric-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; }
        
        .action { background: var(--indigo); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Security Key" style="width:100%; padding:12px; margin:10px 0;">
        <button class="action" onclick="checkPass()">Unlock Dashboard</button>
    </div>

    <div id="app" style="display:none">
        <div class="metric-bar">
            <div class="card"><p style="font-size: 0.7rem; color: #64748b;">READINESS SCORE</p><div id="readiness" style="font-size: 1.5rem; font-weight: 800;">0%</div></div>
            <div class="card"><p style="font-size: 0.7rem; color: #64748b;">SYSTEM STATUS</p><div style="font-size: 1.5rem; font-weight: 800; color: #10b981;">ONLINE</div></div>
        </div>

        <nav style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="action" onclick="show('builder')">Prompt Builder</button>
            <button class="action" style="background:#64748b;" onclick="show('sprint')">Launch Sprint</button>
        </nav>

        <div id="builder" class="tab-content active">
            <select id="role" onchange="saveData()" style="width:100%; padding:10px; border-radius:8px;"><option>Expert Marketer</option><option>Technical Architect</option></select>
            <textarea id="goal" rows="3" style="width:100%; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin:10px 0;" placeholder="Enter objective..." oninput="saveData()"></textarea>
            <button class="action" onclick="buildPrompt()">Construct Strategy</button>
            <div id="output" style="margin-top:20px; padding:20px; background:#f8fafc; border-radius:12px; font-size: 0.9rem;"></div>
            <h4 style="margin-top:30px;">Recent Projects</h4>
            <ul id="history" style="list-style:none; padding:0;"></ul>
        </div>
        
        <div id="sprint" class="tab-content">
            <label><input type="checkbox" class="sprint-task" onchange="updateAll()"> Week 1: Lead Magnet</label><br>
            <label><input type="checkbox" class="sprint-task" onchange="updateAll()"> Week 2: Traffic Framework</label>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    
    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    
    function show(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateAll() {
        // Update Readiness
        const checked = document.querySelectorAll('.sprint-task:checked').length;
        const total = document.querySelectorAll('.sprint-task').length;
        document.getElementById('readiness').innerText = Math.round((checked / total) * 100) + '%';
        saveData();
    }

    function buildPrompt() {
        const p = `Act as ${document.getElementById('role').value}. Strategy for: ${document.getElementById('goal').value}`;
        document.getElementById('output').innerText = p;
        const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
        projects.push(p);
        localStorage.setItem('myProjects', JSON.stringify(projects));
        renderLibrary();
    }

    function renderLibrary() {
        const list = document.getElementById('history');
        const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
        list.innerHTML = projects.slice(-3).map(p => `<li style="padding:10px; border-bottom:1px solid #e2e8f0; font-size: 0.8rem;">${p}</li>`).join('');
    }

    function saveData() {
        localStorage.setItem('role', document.getElementById('role').value);
        localStorage.setItem('goal', document.getElementById('goal').value);
        localStorage.setItem('tasks', JSON.stringify(Array.from(document.querySelectorAll('.sprint-task')).map(t => t.checked)));
    }

    window.onload = () => {
        if(localStorage.getItem('role')) document.getElementById('role').value = localStorage.getItem('role');
        if(localStorage.getItem('goal')) document.getElementById('goal').value = localStorage.getItem('goal');
        const savedTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        document.querySelectorAll('.sprint-task').forEach((t, i) => t.checked = savedTasks[i]);
        updateAll();
        renderLibrary();
    };
</script>
</body>
</html>
