<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Pro Dashboard</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --navy: #0f172a; --indigo: #4f46e5; }
        body { font-family: 'Inter', sans-serif; background: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .dashboard-container { width: 95%; max-width: 1000px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid white; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        
        /* Premium UI Components */
        .metric-bar { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; flex: 1; }
        
        .action { background: var(--indigo); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .action:hover { box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="app">
        <div class="metric-bar">
            <div class="card">
                <p style="font-size: 0.75rem; color: #64748b;">Readiness Score</p>
                <div id="readiness" style="font-size: 1.5rem; font-weight: 800;">50%</div>
            </div>
            <div class="card">
                <p style="font-size: 0.75rem; color: #64748b;">System Status</p>
                <div style="font-size: 1.5rem; font-weight: 800; color: #10b981;">Online</div>
            </div>
        </div>

        <nav style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="action" onclick="show('builder')">Prompt Builder</button>
            <button class="action" style="background:#64748b;" onclick="show('sprint')">Launch Sprint</button>
        </nav>

        <div id="builder" class="tab-content active">
            <textarea id="goal" style="width:100%; border-radius:12px; padding:15px; border:1px solid #e2e8f0;" placeholder="Define objective..."></textarea>
            <button class="action" onclick="calculate()">Process Strategy</button>
        </div>
        
        <div id="sprint" class="tab-content">
            <input type="checkbox" onchange="updateScore()"> Task 1
            <input type="checkbox" onchange="updateScore()"> Task 2
        </div>
    </div>
</div>

<script>
    function updateScore() {
        const checked = document.querySelectorAll('input:checked').length;
        const total = document.querySelectorAll('input').length;
        document.getElementById('readiness').innerText = Math.round((checked / total) * 100) + '%';
    }
    function show(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
