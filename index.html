<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Selling Global | Pro Dashboard</title>
    <!-- Importing Lucide Icons -->
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root { --navy: #1e293b; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #334155; padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        
        /* Dashboard Layout */
        .grid { display: grid; grid-template-columns: 200px 1fr; gap: 30px; }
        nav { display: flex; flex-direction: column; gap: 10px; }
        .tab-btn { display: flex; align-items: center; gap: 10px; padding: 12px; border: none; background: none; cursor: pointer; border-radius: 6px; font-weight: 500; transition: 0.2s; }
        .tab-btn:hover { background: #f1f5f9; }
        .tab-btn.active { background: var(--blue); color: white; }
        
        /* Smart Builder Styling */
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 6px; }
        .action { background: var(--navy); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        #output { background: #f1f5f9; padding: 15px; border-radius: 6px; margin-top: 20px; white-space: pre-wrap; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Enter security key">
        <button class="action" onclick="checkPass()">Unlock Dashboard</button>
    </div>

    <div id="app" style="display:none">
        <div class="grid">
            <nav>
                <button class="tab-btn active" onclick="openTab(event, 'builder')"><i data-lucide="zap"></i>Prompt Builder</button>
                <button class="tab-btn" onclick="openTab(event, 'sprint')"><i data-lucide="check-square"></i>Sprint</button>
            </nav>

            <main>
                <div id="builder" class="tab-content active">
                    <h3>Smart Prompt Builder</h3>
                    <select id="role"><option>Expert Marketer</option><option>Technical Architect</option></select>
                    <textarea id="goal" placeholder="What is your main objective?"></textarea>
                    <button class="action" onclick="buildPrompt()">Construct Prompt</button>
                    <div id="output">Result will appear here...</div>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    
    function buildPrompt() {
        const role = document.getElementById('role').value;
        const goal = document.getElementById('goal').value;
        document.getElementById('output').innerText = `Act as an ${role}. Provide a high-conversion 5-step execution plan for the following goal: "${goal}". Focus on automation and search visibility.`;
    }

    function openTab(evt, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
