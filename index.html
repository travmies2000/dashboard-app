<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root { --navy: #1e293b; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        .grid { display: grid; grid-template-columns: 200px 1fr; gap: 30px; }
        .tab-btn { display: flex; align-items: center; gap: 10px; padding: 12px; border: none; background: none; cursor: pointer; border-radius: 6px; width: 100%; }
        .tab-btn.active { background: var(--blue); color: white; }
        .action { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Security Key">
        <button class="action" onclick="checkPass()">Unlock Dashboard</button>
    </div>

    <div id="app" style="display:none">
        <div class="grid">
            <nav>
                <button class="tab-btn active" onclick="openTab(event, 'builder')"><i data-lucide="zap"></i>Prompt Builder</button>
                <button class="tab-btn" onclick="openTab(event, 'sprint')"><i data-lucide="check-square"></i>Sprint</button>
            </nav>
            <main>
                <div id="builder" class="tab-content active">
                    <h3>Smart Prompt Builder</h3>
                    <select id="role" onchange="saveData()"><option>Expert Marketer</option><option>Technical Architect</option></select>
                    <textarea id="goal" placeholder="Objective..." oninput="saveData()"></textarea>
                    <button class="action" onclick="buildPrompt()">Construct Prompt</button>
                    <button class="action" style="background:#475569" onclick="copyToClipboard()">Copy to Clipboard</button>
                    <div id="output" style="margin-top:20px; padding:15px; background:#f1f5f9; border-radius:6px;"></div>
                </div>
                <div id="sprint" class="tab-content">
                    <h3>30-Day Launch Sprint</h3>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 1: Lead Magnet</label><br>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 2: Traffic Framework</label>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // Persistence Logic
    function saveData() {
        localStorage.setItem('role', document.getElementById('role').value);
        localStorage.setItem('goal', document.getElementById('goal').value);
        const tasks = Array.from(document.querySelectorAll('.sprint-task')).map(t => t.checked);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    window.onload = () => {
        if(localStorage.getItem('role')) document.getElementById('role').value = localStorage.getItem('role');
        if(localStorage.getItem('goal')) document.getElementById('goal').value = localStorage.getItem('goal');
        const savedTasks = JSON.parse(localStorage.getItem('tasks'));
        if(savedTasks) document.querySelectorAll('.sprint-task').forEach((t, i) => t.checked = savedTasks[i]);
    };

    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    function openTab(evt, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function buildPrompt() {
        document.getElementById('output').innerText = `Act as an ${document.getElementById('role').value}. Goal: ${document.getElementById('goal').value}`;
    }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('output').innerText); }
</script>
</body>
</html>
