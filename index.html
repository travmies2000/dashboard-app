<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <style>
        :root {
            --primary: #1e293b; /* Professional Navy */
            --accent: #2563eb;  /* Strategic Blue */
            --bg: #f8fafc;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: #334155; padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        #app { display: none; }
        
        /* Tab Styling */
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: #e2e8f0; font-weight: 600; border-radius: 6px; transition: 0.3s; }
        .tab-btn:hover { background: #cbd5e1; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        /* Input & Buttons */
        textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin: 15px 0; }
        button.action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .tab-content { display: none; margin-top: 20px; border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Enter password">
        <button class="action" onclick="checkPass()">Access Dashboard</button>
    </div>

    <div id="app">
        <nav>
            <button class="tab-btn active" onclick="openTab(event, 'prompt')">Prompt Gen</button>
            <button class="tab-btn" onclick="openTab(event, 'trouble')">Troubleshooter</button>
            <button class="tab-btn" onclick="openTab(event, 'tech')">Tech Stack</button>
            <button class="tab-btn" onclick="openTab(event, 'sprint')">30-Day Sprint</button>
        </nav>

        <div id="prompt" class="tab-content active">
            <h3>Prompt Generator</h3>
            <textarea id="promptInput" rows="3"></textarea>
            <button class="action" onclick="genPrompt()">Generate</button>
            <p id="promptOutput"></p>
        </div>

        <div id="trouble" class="tab-content">
            <h3>Troubleshooting Matrix</h3>
            <select id="issue"><option>Low traffic</option><option>Zero conversions</option></select>
            <button class="action" onclick="diag()">Diagnose</button>
            <p id="diagOutput"></p>
        </div>

        <div id="tech" class="tab-content">
            <h3>Tech Stack Matrix</h3>
            <p>Integrated tools for system automation.</p>
        </div>

        <div id="sprint" class="tab-content">
            <h3>30-Day Launch Sprint</h3>
            <label><input type="checkbox"> Week 1: Lead Magnet</label><br>
            <label><input type="checkbox"> Week 2: Traffic Framework</label>
        </div>
    </div>
</div>

<script>
    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    function openTab(evt, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
