<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root {
            --slate: #334155;
            --indigo: #4f46e5;
            --bg: #f1f5f9;
            --white: #ffffff;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--slate); padding: 50px 20px; }
        .container { max-width: 900px; margin: auto; background: var(--white); padding: 40px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        /* Grid Structure */
        .dashboard-grid { display: grid; grid-template-columns: 220px 1fr; gap: 40px; }
        nav { display: flex; flex-direction: column; gap: 12px; }
        
        /* Interactive Elements */
        .tab-btn { display: flex; align-items: center; gap: 12px; padding: 14px; border: none; background: #f8fafc; cursor: pointer; border-radius: 10px; font-weight: 600; transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .tab-btn:hover { background: #eef2ff; border-color: #c7d2fe; }
        .tab-btn.active { background: var(--indigo); color: white; border-color: var(--indigo); }
        
        .action { background: var(--indigo); color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: transform 0.1s; }
        .action:hover { transform: translateY(-1px); filter: brightness(1.1); }
        
        textarea, select { width: 100%; padding: 16px; border: 1px solid #cbd5e1; border-radius: 10px; margin: 15px 0; background: #f8fafc; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Security Key">
        <button class="action" onclick="checkPass()">Unlock</button>
    </div>

    <div id="app" style="display:none">
        <div class="dashboard-grid">
            <nav>
                <button class="tab-btn active" onclick="openTab(event, 'builder')"><i data-lucide="zap"></i>Builder</button>
                <button class="tab-btn" onclick="openTab(event, 'sprint')"><i data-lucide="check-square"></i>Sprint</button>
            </nav>
            <main>
                <div id="builder" class="tab-content active">
                    <h3>Smart Prompt Builder</h3>
                    <select id="role" onchange="saveData()"><option>Expert Marketer</option><option>Technical Architect</option></select>
                    <textarea id="goal" rows="4" placeholder="Enter objective..." oninput="saveData()"></textarea>
                    <button class="action" onclick="buildPrompt()">Construct</button>
                    <button class="action" style="background:#64748b" onclick="copyToClipboard()">Copy</button>
                    <div id="output" style="margin-top:20px; padding:20px; background:#f8fafc; border-radius:10px; border-left:4px solid var(--indigo);"></div>
                </div>
                <div id="sprint" class="tab-content">
                    <h3>30-Day Launch Sprint</h3>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 1: Lead Magnet</label><br>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 2: Traffic Framework</label>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    // (Existing persistence and tab functions remain here)
</script>
</body>
</html>
