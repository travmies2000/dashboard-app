<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        #app { display: none; }
        .tab-btn { padding: 10px; cursor: pointer; background: #ddd; border: none; margin-bottom: 5px; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ddd; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Access</button>
    </div>

    <div id="app">
        <nav>
            <button class="tab-btn" onclick="openTab('prompt')">Prompt Gen</button>
            <button class="tab-btn" onclick="openTab('trouble')">Troubleshooter</button>
            <button class="tab-btn" onclick="openTab('tech')">Tech Stack</button>
            <button class="tab-btn" onclick="openTab('sprint')">30-Day Sprint</button>
        </nav>

        <div id="prompt" class="tab-content active">
            <h3>Prompt Generator</h3>
            <textarea id="promptInput" rows="3" style="width:100%"></textarea>
            <button onclick="genPrompt()">Generate</button>
            <p id="promptOutput"></p>
        </div>

        <div id="trouble" class="tab-content">
            <h3>Troubleshooting Matrix</h3>
            <select id="issue">
                <option value="Low traffic">Low traffic</option>
                <option value="Zero conversions">Zero conversions</option>
            </select>
            <button onclick="diag()">Diagnose</button>
            <p id="diagOutput"></p>
        </div>

        <div id="tech" class="tab-content">
            <h3>Tech Stack Matrix</h3>
            <ul>
                <li><strong>Hosting:</strong> GitHub Pages</li>
                <li><strong>Automation:</strong> AI Prompt Library</li>
                <li><strong>Sales:</strong> PayHip Integration</li>
            </ul>
        </div>

        <div id="sprint" class="tab-content">
            <h3>30-Day Launch Sprint</h3>
            <label><input type="checkbox"> Week 1: Lead Magnet Setup</label><br>
            <label><input type="checkbox"> Week 2: Traffic Framework</label><br>
            <label><input type="checkbox"> Week 3: Automation Logic</label><br>
            <label><input type="checkbox"> Week 4: Final Launch</label>
        </div>
    </div>
</div>

<script>
    function checkPass() { if(document.getElementById('pass').value === 'secure123') { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; } }
    function openTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    function genPrompt() { document.getElementById('promptOutput').innerText = "Expert Prompt: " + document.getElementById('promptInput').value; }
    function diag() { const issue = document.getElementById('issue').value; document.getElementById('diagOutput').innerText = issue === 'Low traffic' ? "Focus on SEO and social distribution." : "Review offer clarity and lead magnet alignment."; }
</script>
</body>
</html>
