<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Selling Global | Master Dashboard</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root { --slate: #334155; --indigo: #4f46e5; --bg: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--slate); padding: 50px 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        
        /* Metric Card */
        .metric-card { background: #eef2ff; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: space-between; border: 1px solid #c7d2fe; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--indigo); }
        
        .dashboard-grid { display: grid; grid-template-columns: 220px 1fr; gap: 40px; }
        .tab-btn { display: flex; align-items: center; gap: 12px; padding: 14px; border: none; background: #f8fafc; cursor: pointer; border-radius: 10px; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .tab-btn.active { background: var(--indigo); color: white; }
        
        .action { background: var(--indigo); color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h2>Digital Selling Global</h2>
        <input type="password" id="pass" placeholder="Security Key">
        <button class="action" onclick="checkPass()">Unlock</button>
    </div>

    <div id="app" style="display:none">
        <!-- New Metric Card -->
        <div class="metric-card">
            <div>
                <div style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700;">System Readiness</div>
                <div class="metric-value">85% Operational</div>
            </div>
            <i data-lucide="bar-chart-3" style="color: var(--indigo);"></i>
        </div>

        <div class="dashboard-grid">
            <nav>
                <button class="tab-btn active" onclick="openTab(event, 'builder')"><i data-lucide="zap"></i>Builder</button>
                <button class="tab-btn" onclick="openTab(event, 'sprint')"><i data-lucide="check-square"></i>Sprint</button>
            </nav>
            <main>
                <div id="builder" class="tab-content active">
                    <h3>Smart Prompt Builder</h3>
                    <select id="role" onchange="saveData()"><option>Expert Marketer</option><option>Technical Architect</option></select>
                    <textarea id="goal" rows="4" placeholder="Enter objective..." oninput="saveData()"></textarea>
                    <button class="action" onclick="buildPrompt()">Construct</button>
                    <button class="action" style="background:#64748b" onclick="copyToClipboard()">Copy</button>
                    <div id="output" style="margin-top:20px; padding:20px; background:#f8fafc; border-radius:10px;"></div>
                </div>
                <div id="sprint" class="tab-content">
                    <h3>30-Day Launch Sprint</h3>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 1: Lead Magnet</label><br>
                    <label><input type="checkbox" class="sprint-task" onchange="saveData()"> Week 2: Traffic Framework</label>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    // (Ensure your existing persistence and tab functions are included here)
</script>
</body>
</html>
