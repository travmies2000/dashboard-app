<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #app { display: none; } /* Hidden by default */
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login">
        <h3>Dashboard Login</h3>
        <input type="password" id="pass" placeholder="Enter password">
        <button onclick="checkPass()">Login</button>
    </div>

    <!-- Dashboard Content -->
    <div id="app">
        <h1>Master Dashboard</h1>
        <textarea id="input" placeholder="Enter your goal..."></textarea>
        <button onclick="generate()">Generate Prompt</button>
        <p id="output"></p>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === 'secure123') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else { alert('Incorrect password'); }
        }

        function generate() {
            const val = document.getElementById('input').value;
            document.getElementById('output').innerText = "Act as an expert assistant. Help me achieve: " + val;
        }
    </script>
</body>
</html>
